<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Smart Hotel Management</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-brand">
      <span class="brand-icon">🏨</span>
      <span class="brand-name">SmartHotel</span>
    </div>
    <nav class="sidebar-nav">
      <a href="#" class="nav-item active" data-section="dashboard">📊 Dashboard</a>
      <a href="#" class="nav-item" data-section="rooms">🛏️ Rooms</a>
      <a href="#" class="nav-item" data-section="customers">👥 Customers</a>
      <a href="#" class="nav-item" data-section="bookings">📋 Bookings</a>
      <a href="#" class="nav-item" data-section="payments">💳 Payments</a>
      <a href="#" class="nav-item" data-section="services">🛎️ Services</a>
      <a href="#" class="nav-item" data-section="food">🍽️ Food Orders</a>
      <a href="#" class="nav-item" data-section="housekeeping">🧹 Housekeeping</a>
      <a href="#" class="nav-item" data-section="feedback">⭐ Feedback</a>
    </nav>
  </aside>

  <!-- Main -->
  <main class="main">
    <header class="topbar">
      <h1 class="page-title" id="pageTitle">Dashboard</h1>
      <div class="topbar-right">
        <span class="badge-live">● LIVE</span>
        <span id="currentTime" class="clock"></span>
      </div>
    </header>

    <div class="content" id="content">
      <!-- Sections injected by JS -->
    </div>
  </main>

  <div id="toast" class="toast hidden"></div>

  <script src="js/app.js"></script>
</body>
</html>
